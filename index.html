<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anuphongla - Welcome</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            background: white;
            padding: 60px 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 90%;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        p {
            color: #666;
            font-size: 1.1em;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .button {
            display: inline-block;
            padding: 12px 30px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
            margin: 10px;
        }
        .button:hover {
            background: #764ba2;
        }
        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #999;
            font-size: 0.9em;
        }

</head>
<body>
    <div class="container">
        <h1>🎉 ยินดีต้อนรับ!</h1>
        <p>คุณกำลังดูเว็บไซต์ GitHub Pages ของ <strong>Anuphongla</strong></p>

        <div>

            <a href="https://github.com/Anuphongla/Anuphongla.github.io" class="button">📝 Repository</a>
        </div>
        
        <div class="footer">
            <p>✨ สามารถแก้ไข index.html นี้เพื่อปรับแต่งเว็บไซต์ของคุณได้</p>
        </div>
    </div>
</body>
</html>
